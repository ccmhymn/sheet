<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>찬송가 악보 검색</title>

    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- DataTables 1.13.8 + Bootstrap5 공식 번들 -->
    <link rel="stylesheet" href="https://cdn.datatables.net/v/bs5/dt-1.13.8/datatables.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap">
    <!-- App CSS -->
    <link rel="stylesheet" href="css/main.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!-- DataTables 1.13.8 + Bootstrap5 공식 번들 (jquery.dataTables + dataTables.bootstrap5 포함) -->
    <script src="https://cdn.datatables.net/v/bs5/dt-1.13.8/datatables.min.js"></script>
    <!-- Bootstrap 5 JS bundle (Popper 포함) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- MIDI Player -->
    <script src="//ccmhymn.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"></script>
    <script src="//ccmhymn.github.io/webaudiofont/examples/MIDIFile.js"></script>
    <!-- App Scripts -->
    <script src="js/main.js?version=25"></script>
    <script src="js/midi.js?version=25"></script>
</head>

<body>

    <!-- ══ 앱 헤더 ══ -->
    <header id="appHeader">
        <div class="app-brand">
            <i class="bi bi-music-note-beamed"></i>
            <span class="brand-name">찬송가</span>
            <span class="brand-subtitle d-none d-sm-inline">악보 검색</span>
        </div>
        <div class="header-search">
            <div class="search-wrap">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="globalSearch" class="search-input" placeholder="전체 검색...  (/ 키)">
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-sm btn-outline-light" id="toggleExtraCols" title="코드·박자 열 표시/숨김">
                <i class="bi bi-eye-slash"></i>
                <span class="d-none d-sm-inline"> 코드/박자</span>
            </button>
            <span class="version-badge d-none d-md-inline">Ver 13.0</span>
        </div>
    </header>

    <!-- ══ 테이블 영역 ══ -->
    <main id="tableWrapper">
        <!-- 데이터 로드 실패 메시지 -->
        <div id="loadError" class="d-none p-3">
            <div class="alert alert-danger mb-0">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                찬송가 데이터를 불러오지 못했습니다. 페이지를 새로고침 해주세요.
            </div>
        </div>
        <table id="myTable" class="table table-sm table-hover w-100">
            <thead>
                <tr>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tfoot>
                <tr>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                    <th></th>
                </tr>
            </tfoot>
        </table>
    </main>

    <!-- ══ Bootstrap 5 모달 ══ -->
    <div class="modal fade" id="hymnModal" tabindex="-1" aria-labelledby="hymnModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">

                <!-- 모달 헤더 -->
                <div class="modal-header py-2 px-3">
                    <h6 class="modal-title fw-bold text-primary" id="hymnModalTitle">찬송가</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>

                <!-- 모달 바디 -->
                <div class="modal-body p-2">
                    <div class="row g-2" id="modalBodyRow">

                        <!-- 악보 이미지 컬럼 -->
                        <div class="col-12 col-md-6" id="imgCol">
                            <div class="sheet-img-wrap rounded border">
                                <img id="preview" src="" class="img-fluid w-100" alt="악보이미지" style="display:block;">
                                <div class="sheet-img-overlay">
                                    <a id="sheetImg" href="" target="_blank" class="btn btn-sm btn-light shadow">
                                        <i class="bi bi-zoom-in me-1"></i>크게 보기
                                    </a>
                                </div>
                            </div>
                            <div id="img-error" class="d-none alert alert-warning py-1 mt-1 small">
                                <i class="bi bi-image me-1"></i>악보 이미지를 불러올 수 없습니다.
                            </div>
                        </div>

                        <!-- 설명 컬럼: YouTube + 가사 + MIDI -->
                        <div class="col-12 col-md-6" id="descCol">
                            <!-- YouTube 링크 -->
                            <a id="youtubeLink" href="" target="_blank"
                               class="btn btn-sm btn-outline-danger w-100 mb-2">
                                <i class="bi bi-youtube me-1"></i>Youtube 검색
                            </a>
                            <!-- 가사 -->
                            <div id="fullText" class="lyrics-box rounded border p-2 mb-2 small"></div>
                            <!-- MIDI 컨트롤 -->
                            <div id="cntls" class="midi-box"></div>
                        </div>

                    </div><!-- /.row -->
                </div><!-- /.modal-body -->

                <!-- 모달 푸터 -->
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-primary btn-sm" data-bs-dismiss="modal">
                        <i class="bi bi-check-lg me-1"></i>닫기
                    </button>
                </div>

            </div><!-- /.modal-content -->
        </div><!-- /.modal-dialog -->
    </div>
    <!-- ══ END 모달 ══ -->

    <!-- 복사 완료 토스트 -->
    <div id="copyToast"
         style="display:none; position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
                background:#1e293b; color:#f1f5f9; padding:0.45rem 1.2rem; border-radius:2rem;
                font-size:0.82rem; border:1px solid #3b82f6; z-index:9999; white-space:nowrap;
                box-shadow:0 4px 14px rgba(0,0,0,0.35); pointer-events:none;">
        <i class="bi bi-check-circle-fill me-1 text-success"></i>복사되었습니다!
    </div>

</body>
</html>
